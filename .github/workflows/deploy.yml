name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Handle build output paths
        run: |
          if [ -d ".output/public" ]; then
            cp -r .output/public ./dist_final
          elif [ -d "dist" ]; then
            cp -r dist ./dist_final
          else
            mkdir ./dist_final && cp index.html ./dist_final/ || true
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist_final

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
